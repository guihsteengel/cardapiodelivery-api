<h1>?? Cardápio</h1>

<div id="products"></div>

<script>
async function loadProducts() {
    const response = await fetch("http://localhost:5283/api/product");
    const products = await response.json();

    const container = document.getElementById("products");

    products.forEach(p => {
        const div = document.createElement("div");

        div.innerHTML = `
            <h3>${p.name}</h3>
            <p>${p.description}</p>
            <strong>R$ ${p.price}</strong>
            <br>
            <button onclick="addToCart(${p.id})">Adicionar</button>
            <hr>
        `;

        container.appendChild(div);npxz 
    });
}

async function addToCart(productId) {
    await fetch(`http://localhost:5283/api/cart/1/add?productId=${productId}&quantity=1`, {
        method: "POST"
    });

    alert("Adicionado ao carrinho!");
}

loadProducts();
</script>
