<!DOCTYPE html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8">
			<title>Lanchonete do Stengel</title>

			<style>
				body {
				font-family: Arial;
				background: #121212;
				margin: 0;
				color: white;
				}

				.header {
				background: #ff3d00;
				padding: 20px;
				text-align: center;
				}

				.main {
				display: flex;
				gap: 20px;
				padding: 20px;
				max-width: 1200px;
				margin: auto;
				}

				.grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
				gap: 15px;
				}

				.card {
				background: #1e1e1e;
				border-radius: 12px;
				overflow: hidden;
				}

				.card img {
				width: 100%;
				height: 140px;
				object-fit: cover;
				}

				.card-content {
				padding: 10px;
				}

				.price {
				color: #4caf50;
				font-weight: bold;
				}

				button {
				background: #ff3d00;
				color: white;
				border: none;
				padding: 10px;
				border-radius: 8px;
				cursor: pointer;
				}

				/* CARRINHO */
				.cart {
				width: 300px;
				background: #1e1e1e;
				padding: 20px;
				border-radius: 12px;
				display: flex;
				flex-direction: column;
				gap: 15px;
				}

				.cart-total {
				background: #2a2a2a;
				padding: 12px;
				border-radius: 8px;
				text-align: center;
				}

				.cart-total span {
				display: block;
				font-size: 22px;
				color: #4caf50;
				}

				.cart-item {
				background: #2a2a2a;
				padding: 10px;
				border-radius: 8px;
				}

				.qty {
				display: flex;
				align-items: center;
				gap: 10px;
				}

				.qty button {
				width: 30px;
				height: 30px;
				padding: 0;
				background: #444;
				}

				.remove-btn {
				background: red;
				margin-left: 10px;
				}

				/* MODAL */
				.modal-overlay {
				display: none;
				position: fixed;
				top:0;left:0;
				width:100%;height:100%;
				background: rgba(0,0,0,0.7);
				justify-content: center;
				align-items: center;
				}

				.modal {
				background: #1e1e1e;
				padding: 20px;
				border-radius: 10px;
				width: 300px;
				}

				.modal input, .modal select {
				width: 100%;
				padding: 8px;
				margin-bottom: 10px;
				}


				/* ANIMAÇÃO DOS CARDS */
				.card {
				transition: 0.25s ease;
				box-shadow: 0 0 0 rgba(0,0,0,0);
				}

				.card:hover {
				transform: translateY(-5px);
				box-shadow: 0 10px 25px rgba(0,0,0,0.4);
				}

				/* BOTÕES */
				button {
				transition: 0.2s ease;
				}

				button:hover {
				transform: scale(1.05);
				opacity: 0.95;
				}

				/* CARRINHO */
				.cart {
				box-shadow: 0 0 20px rgba(0,0,0,0.3);
				}

				/* ITEMS DO CARRINHO */
				.cart-item {
				transition: 0.2s ease;
				}

				.cart-item:hover {
				background: #333;
				}

				/* HEADER */
				.header {
				box-shadow: 0 2px 15px rgba(0,0,0,0.4);
				}

				/* IMAGENS */
				.card img {
				transition: 0.3s ease;
				}

				.card:hover img {
				transform: scale(1.05);
				}

				/* TOAST */
				.toast {
				position: fixed;
				bottom: 30px;
				right: 30px;

				background: #22c55e;
				color: white;

				padding: 16px 22px;

				border-radius: 12px;

				font-weight: bold;

				opacity: 0;
				transform: translateY(20px);

				transition: 0.3s ease;

				box-shadow: 0 10px 30px rgba(0,0,0,0.4);

				z-index: 9999;
				}

				.toast.show {
				opacity: 1;
				transform: translateY(0);
				}
			</style>
		</head>

	<div id="toast" class="toast"></div>

	<body>

		<div class="header">
			<h1>🍔 Lanchonete do Stengel</h1>
		</div>

		<div class="main">

			<div style="flex:1;">
				<h2>Cardápio</h2>
				<div id="products" class="grid"></div>
			</div>

			<div class="cart">

				<div class="cart-total">
					Total
					<span id="total">R$ 0,00</span>
				</div>

				<h3>🛒 Carrinho</h3>
				<div id="cart-items"></div>

				<button onclick="openModal()">Finalizar Pedido</button>

			</div>

		</div>

		<!-- MODAL -->
		<div id="modal" class="modal-overlay">
			<div class="modal">
				<h3>Finalizar Pedido</h3>

				<input id="street" placeholder="Rua">
					<input id="number" placeholder="Número">
						<input id="city" placeholder="Cidade">
							<input id="zip" placeholder="CEP">

								<select id="payment">
									<option value="PIX">PIX ⚡</option>
									<option value="CARD">Cartão 💳</option>
									<option value="CASH">Dinheiro 💵</option>
								</select>

								<button onclick="confirmOrder()">Confirmar</button>
								<button onclick="closeModal()" style="background:#666;">Cancelar</button>
							</div>
		</div>

		<script>

			const CART_ID = 1;

			function formatPrice(v){
			return v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
			}

			// PRODUTOS
			async function loadProducts(){
			const res = await fetch("http://localhost:5283/api/product");
			const products = await res.json();

			const container = document.getElementById("products");
			container.innerHTML = "";

			products.forEach(p=>{
			const div = document.createElement("div");

			div.classList.add("card");
			div.innerHTML = `
			<img src="${p.imageUrl || '/images/burger.jpg'}">
				<div class="card-content">
					<h3>${p.name}</h3>
					<p>${p.description || ""}</p>
					<p class="price">${formatPrice(p.price)}</p>
					<button onclick="addToCart(${p.id})">Adicionar</button>
				</div>
				`;

				container.appendChild(div);
				});
				}

				// CARRINHO
				async function loadCart(){
				const res = await fetch(`http://localhost:5283/api/cart/${CART_ID}`);
				const cart = await res.json();

				let total = 0;

				const container = document.getElementById("cart-items");
				container.innerHTML = "";

				cart.items.forEach(item=>{
				total += item.product.price * item.quantity;

				const div = document.createElement("div");
				div.classList.add("cart-item");

				div.innerHTML = `
				<div style="display:flex; justify-content:space-between; align-items:center;">

					<div>
						<strong>${item.product.name}</strong>
						<br>
							<span style="font-size:13px; opacity:0.7;">
								${formatPrice(item.product.price)} cada
							</span>
						</div>

					<div style="text-align:right;">
						<div style="margin-bottom:5px;">
							${formatPrice(item.product.price * item.quantity)}
						</div>

						<div style="display:flex; align-items:center; gap:6px;">

							<button onclick="decrease(${item.productId}, ${item.quantity})">➖</button>

							<span style="min-width:20px; text-align:center;">
								${item.quantity}
							</span>

							<button onclick="addToCart(${item.productId})">➕</button>

							<button class="remove-btn" onclick="removeFromCart(${item.productId})">❌</button>

						</div>
					</div>

				</div>
				`;

				container.appendChild(div);
				});

				document.getElementById("total").innerText = formatPrice(total);
				}

				async function addToCart(id){
				await fetch(`http://localhost:5283/api/cart/${CART_ID}/add?productId=${id}&quantity=1`, {method:"POST"});
					loadCart();
					}

					async function removeFromCart(id){
					await fetch(`http://localhost:5283/api/cart/${CART_ID}/remove?productId=${id}`, {method:"POST"});
					loadCart();
					}

					async function decrease(productId, qty){
					await removeFromCart(productId);

					if(qty > 1){
					await fetch(`http://localhost:5283/api/cart/${CART_ID}/add?productId=${productId}&quantity=${qty-1}`, {method:"POST"});
				}

				loadCart();
				}

				// MODAL
				function openModal(){
				document.getElementById("modal").style.display="flex";
				}

				function closeModal(){
				document.getElementById("modal").style.display="none";
				}

				// PEDIDO
				async function confirmOrder(){
				const order = {
				cartId: CART_ID,
				address: {
				street: street.value,
				number: number.value,
				city: city.value,
				zipCode: zip.value
				},
				paymentMethod: payment.value
				};

				await fetch("http://localhost:5283/api/order", {
				method: "POST",
				headers: { "Content-Type": "application/json" },
				body: JSON.stringify(order)
				});

				showToast("Pedido realizado com sucesso ✅");
				closeModal();
				loadCart();
				}

				function showToast(message) {

				const toast = document.getElementById("toast");

				toast.innerText = message;

				toast.classList.add("show");

				setTimeout(() => {
				toast.classList.remove("show");
				}, 3000);
				}

				// INIT
				loadProducts();
				loadCart();

			</script>

	</body>
</html>
